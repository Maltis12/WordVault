<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WordVault</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-grid"></div>

  <header>
    <div class="logo">WORDVAULT</div>
    <button class="trophy-toggle" id="trophyToggle" onclick="openTrophyRoom()">
      <span class="trophy-icon-sm">🏆</span>
      <span>Trophy Room</span>
      <span class="badge" id="trophyBadge">0</span>
    </button>
  </header>

  <main>
    <section class="hero">
      <h1>Have you said it first?</h1>
      <p class="sub">Submit an English word. Find out how many got there before you.</p>
    </section>

    <div class="input-card">
      <div class="input-row">
        <input
          type="text"
          id="wordInput"
          placeholder="Type a word..."
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          maxlength="45"
        />
        <button id="submitBtn" onclick="submitWord()">Submit</button>
      </div>
      <div id="resultArea"></div>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <span class="stat-num" id="statWords">—</span>
        <span class="stat-label">unique words</span>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <span class="stat-num" id="statSubmissions">—</span>
        <span class="stat-label">total submissions</span>
      </div>

    </div>
  </main>

  <!-- Trophy Room overlay -->
  <div class="overlay" id="overlay" onclick="closeTrophyRoom()"></div>
  <aside class="trophy-room" id="trophyRoom">
    <div class="trophy-header">
      <h2>Trophy Room</h2>
      <button class="close-btn" onclick="closeTrophyRoom()">✕</button>
    </div>
    <p class="trophy-desc">Words you discovered first.</p>
    <div class="trophies-grid" id="trophiesGrid">
      <p class="empty-msg">No trophies yet — be the first to submit a new word!</p>
    </div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
