<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WordVault</title>
  <meta name="description" content="Submit an English word and find out if you were the first. Claim your trophy." />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3989179117356133"
     crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-grid"></div>

  <header>
    <div class="logo">WORDVAULT</div>
    <div class="header-right">
      <button class="trophy-toggle" onclick="openTrophyRoom()">
        <span class="trophy-icon-sm">🏆</span>
        <span>Trophy Room</span>
        <span class="badge" id="trophyBadge">0</span>
      </button>
      <button class="leaderboard-toggle" onclick="openLeaderboard()">🏅 Leaderboard</button>
      <div id="authArea"></div>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>Have you said it first?</h1>
      <p class="sub">Submit an English word. Find out how many got there before you.</p>
    </section>

    <div class="input-card">
      <div class="input-row">
        <input type="text" id="wordInput" placeholder="Type a word..."
          autocomplete="off" autocorrect="off" spellcheck="false" maxlength="45" />
        <button id="submitBtn" onclick="submitWord()">Submit</button>
      </div>
      <div id="resultArea"></div>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <span class="stat-num" id="statWords">—</span>
        <span class="stat-label">unique words</span>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <span class="stat-num" id="statSubmissions">—</span>
        <span class="stat-label">total submissions</span>
      </div>
    </div>
  </main>

  <!-- Overlay -->
  <div class="overlay" id="overlay" onclick="closeAll()"></div>

  <!-- Trophy Room -->
  <aside class="side-panel" id="trophyRoom">
    <div class="panel-header">
      <h2>Trophy Room</h2>
      <button class="close-btn" onclick="closeAll()">✕</button>
    </div>
    <p class="panel-desc" id="trophyDesc">Words you discovered first.</p>
    <div class="trophies-grid" id="trophiesGrid">
      <p class="empty-msg">No trophies yet!</p>
    </div>
  </aside>

  <!-- Leaderboard -->
  <aside class="side-panel" id="leaderboardPanel">
    <div class="panel-header">
      <h2>Leaderboard</h2>
      <button class="close-btn" onclick="closeAll()">✕</button>
    </div>
    <p class="panel-desc">Most first discoveries.</p>
    <div id="leaderboardList"><p class="empty-msg">Loading...</p></div>
  </aside>

  <!-- Auth Modal -->
  <div class="modal-wrap" id="authModal">
    <div class="modal">
      <div class="modal-logo">WORDVAULT</div>

      <div class="modal-tabs">
        <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Log in</button>
        <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">Create account</button>
      </div>

      <!-- Login -->
      <div id="loginForm">
        <input class="modal-input" type="text" id="loginUsername" placeholder="Username" maxlength="20" />
        <input class="modal-input" type="password" id="loginPassword" placeholder="Password" />
        <div class="modal-error" id="loginError"></div>
        <button class="modal-submit" onclick="loginUser()">Log in</button>
        <button class="guest-btn" onclick="continueAsGuest()">Continue as guest</button>
      </div>

      <!-- Register -->
      <div id="registerForm" style="display:none">
        <input class="modal-input" type="text" id="regUsername" placeholder="Username (3–20 chars, a–z 0–9 _)" maxlength="20" />
        <input class="modal-input" type="password" id="regPassword" placeholder="Password (min 6 characters)" />
        <input class="modal-input" type="password" id="regPassword2" placeholder="Confirm password" />
        <div class="modal-error" id="registerError"></div>
        <button class="modal-submit" onclick="registerUser()">Create account</button>
        <button class="guest-btn" onclick="continueAsGuest()">Continue as guest</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
